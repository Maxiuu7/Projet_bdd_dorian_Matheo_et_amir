{% extends 'base.html' %}
{% block title %}{{ action }} un pilote — Centre de Pilotage{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ action }} un pilote</h1>
    <p>{{ 'Modifier les informations du pilote' if pilote else 'Remplissez le formulaire pour ajouter un nouveau pilote' }}</p>
</div>

<div class="card form-card">
    <form method="POST" action="{{ url_for('pilotes_edit', id=pilote.id_pilote) if pilote else url_for('pilotes_add') }}">

        <div class="form-group">
            <label for="nom_pilote">Nom</label>
            <input type="text" id="nom_pilote" name="nom_pilote" class="form-control"
                   value="{{ pilote.nom_pilote if pilote else '' }}" required placeholder="Ex : Dupont">
        </div>

        <div class="form-group">
            <label for="prenom_pilote">Prénom</label>
            <input type="text" id="prenom_pilote" name="prenom_pilote" class="form-control"
                   value="{{ pilote.prenom_pilote if pilote else '' }}" required placeholder="Ex : Jean">
        </div>

        <div class="form-group">
            <label for="date_naissance">Date de naissance</label>
            <input type="date" id="date_naissance" name="date_naissance" class="form-control"
                   value="{{ pilote.date_naissance if pilote else '' }}" required>
        </div>

        <div class="form-group">
            <label for="niveau">Niveau</label>
            <select id="niveau" name="niveau" class="form-control" required>
                <option value="">— Choisir un niveau —</option>
                {% for n in ['debutant', 'intermediaire', 'confirme', 'expert'] %}
                <option value="{{ n }}" {{ 'selected' if pilote and pilote.niveau == n }}>
                    {{ n|capitalize }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control"
                   value="{{ pilote.email if pilote else '' }}" required placeholder="prenom.nom@mail.com">
        </div>

        <div class="actions" style="margin-top: 1.5rem;">
            <button type="submit" class="btn btn-primary">{{ action }}</button>
            <a href="{{ url_for('pilotes_list') }}" class="btn btn-secondary">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
